<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#1E1B4B"/>
    </linearGradient>
    <linearGradient id="face" x1="6" y1="10" x2="26" y2="30" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E0E7FF"/>
    </linearGradient>
    <linearGradient id="snout" x1="10" y1="23" x2="22" y2="30" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#C4B5FD"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- Left horn — thick, bold, curving upward -->
  <path d="M9,13 C7,9 5,5 3,2 L7,3 C8,6 10,10 12,14 Z" fill="white" opacity="0.95"/>
  <!-- Right horn -->
  <path d="M23,13 C25,9 27,5 29,2 L25,3 C24,6 22,10 20,14 Z" fill="white" opacity="0.95"/>

  <!-- Head -->
  <ellipse cx="16" cy="20" rx="11" ry="10" fill="url(#face)"/>

  <!-- Snout -->
  <ellipse cx="16" cy="25" rx="6" ry="3.5" fill="url(#snout)"/>

  <!-- Nostrils -->
  <ellipse cx="13.6" cy="25" rx="1.4" ry="1.1" fill="#4C1D95" opacity="0.55"/>
  <ellipse cx="18.4" cy="25" rx="1.4" ry="1.1" fill="#4C1D95" opacity="0.55"/>

  <!-- Eyes -->
  <circle cx="12" cy="18.5" r="2" fill="#312E81"/>
  <circle cx="20" cy="18.5" r="2" fill="#312E81"/>

  <!-- Eye shine -->
  <circle cx="12.7" cy="17.8" r="0.7" fill="white"/>
  <circle cx="20.7" cy="17.8" r="0.7" fill="white"/>

  <!-- Forehead highlight -->
  <ellipse cx="16" cy="14" rx="5" ry="2.5" fill="white" opacity="0.15"/>
</svg>
