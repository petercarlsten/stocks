<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1E1B4B"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
    <linearGradient id="bull" x1="4" y1="3" x2="28" y2="29" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FCD34D"/>
      <stop offset="55%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#EF4444"/>
    </linearGradient>
    <linearGradient id="snout" x1="10" y1="22" x2="22" y2="29" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F97316"/>
      <stop offset="100%" stop-color="#DC2626"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- Left horn -->
  <path d="M10,13 C8,9 5,5 4,3 C5,3 7,4 8,6 C9,8 11,12 12,14 Z" fill="url(#bull)"/>
  <!-- Right horn -->
  <path d="M22,13 C24,9 27,5 28,3 C27,3 25,4 24,6 C23,8 21,12 20,14 Z" fill="url(#bull)"/>

  <!-- Head -->
  <ellipse cx="16" cy="20" rx="11" ry="10" fill="url(#bull)"/>

  <!-- Snout -->
  <ellipse cx="16" cy="24.5" rx="5.5" ry="3" fill="url(#snout)" opacity="0.9"/>

  <!-- Nostrils -->
  <ellipse cx="13.8" cy="24.5" rx="1.3" ry="1" fill="#0F172A" opacity="0.6"/>
  <ellipse cx="18.2" cy="24.5" rx="1.3" ry="1" fill="#0F172A" opacity="0.6"/>

  <!-- Eyes -->
  <circle cx="12" cy="18" r="1.9" fill="#0F172A" opacity="0.75"/>
  <circle cx="20" cy="18" r="1.9" fill="#0F172A" opacity="0.75"/>

  <!-- Eye shine -->
  <circle cx="12.6" cy="17.4" r="0.6" fill="white" opacity="0.9"/>
  <circle cx="20.6" cy="17.4" r="0.6" fill="white" opacity="0.9"/>
</svg>
